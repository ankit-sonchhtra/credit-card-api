definitions:
  models.BadRequestError:
    properties:
      error_code:
        example: ERR_CC_BAD_REQUEST
        type: string
      error_message:
        example: invalid request body
        type: string
      status_code:
        example: 400
        type: integer
    type: object
  models.ConflictError:
    properties:
      error_code:
        example: ERR_CC_CONFLICT
        type: string
      error_message:
        example: resource already exist
        type: string
      status_code:
        example: 409
        type: integer
    type: object
  models.CreateAccountRequest:
    properties:
      document_number:
        description: only allow numeric value
        example: "0987654321"
        maxLength: 12
        type: string
    required:
    - document_number
    type: object
  models.CreateAccountResponse:
    properties:
      account_id:
        example: 1
        type: integer
      document_number:
        example: "0987654321"
        type: string
    type: object
  models.CreateTransactionResponse:
    properties:
      transaction_id:
        example: 1
        type: integer
    type: object
  models.GetAccountResponse:
    properties:
      account_id:
        example: 1
        type: integer
      document_number:
        example: "0987654321"
        type: string
    type: object
  models.InternalServerError:
    properties:
      error_code:
        example: ERR_CC_INTERNAL_SERVER_ERROR
        type: string
      error_message:
        example: internal server error
        type: string
      status_code:
        example: 500
        type: integer
    type: object
  models.NotFoundError:
    properties:
      error_code:
        example: ERR_CC_ACCOUNT_NOT_PRESENT
        type: string
      error_message:
        example: account not present
        type: string
      status_code:
        example: 404
        type: integer
    type: object
  models.TransactionRequest:
    properties:
      account_id:
        example: 1
        type: integer
      amount:
        example: -123.45
        type: number
      operation_type_id:
        example: 1
        type: integer
    required:
    - account_id
    - amount
    - operation_type_id
    type: object
info:
  contact: {}
paths:
  /api/credit-card-api/v1/accounts:
    post:
      consumes:
      - application/json
      description: Create an account by request payload
      parameters:
      - description: Request Body
        in: body
        name: CreateAccountRequest
        required: true
        schema:
          $ref: '#/definitions/models.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.CreateAccountResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.BadRequestError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/models.ConflictError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.InternalServerError'
      summary: Create an account
      tags:
      - Accounts
  /api/credit-card-api/v1/accounts/{accountId}:
    get:
      description: Get an account by accountId
      parameters:
      - description: accountId
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GetAccountResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.NotFoundError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.InternalServerError'
      summary: Get an account
      tags:
      - Accounts
  /api/credit-card-api/v1/transactions:
    post:
      consumes:
      - application/json
      description: Create transaction by request payload
      parameters:
      - description: Request Body
        in: body
        name: CreateTransactionRequest
        required: true
        schema:
          $ref: '#/definitions/models.TransactionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.CreateTransactionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.BadRequestError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.InternalServerError'
      summary: Create transaction
      tags:
      - Transactions
swagger: "2.0"
